# Port remap — keeps docker-magento off the host's native stack.
# The host already runs system nginx on :80 and host MySQL on :3306, so the
# default docker-magento bindings (80/443, 3306, 6379, 9200) would collide.
# System nginx reverse-proxies https://249.magento.default (:443) ->
# https://127.0.0.1:8443 (this app container).
#
# The `!override` tag REPLACES each base `ports` list rather than concatenating
# it (Docker Compose default merge behaviour), so the conflicting :80/:3306
# bindings are dropped, not kept alongside the remapped ones.
services:
  app:
    ports: !override
      - "8443:8443"      # host 8443 -> container HTTPS; system nginx proxies :443 here
  db:
    ports: !override
      - "3307:3306"
  redis:
    ports: !override
      - "6380:6379"
  opensearch:
    ports: !override
      - "9201:9200"
      - "9301:9300"
