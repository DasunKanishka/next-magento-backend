# System-nginx reverse proxy for the next-bns docker-magento backend.
# The docker app container publishes HTTPS on host 127.0.0.1:8443 (remapped in
# compose.override.yaml to avoid colliding with the host's native :80/:443).
# This vhost terminates :443 with an mkcert leaf and proxies to the container.
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# `nginx -t`, then reload. See clarifications.md #1 + issue 001.

server {
    listen 80;
    listen [::]:80;
    server_name 249.magento.default;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 249.magento.default;

    ssl_certificate     /home/dasun/user/CERTS/249.magento.default.pem;
    ssl_certificate_key /home/dasun/user/CERTS/249.magento.default-key.pem;

    client_max_body_size 64m;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;             # keepalive to upstream
        proxy_set_header Connection "";     # clear inbound Connection header so upstream keepalive works
        proxy_buffer_size 16k;              # Magento storefront sends large headers (Set-Cookie/cache) — default 8k -> 502
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;               # internal hop to the container's self-signed cert
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
    }
}
